<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Respiratory Disease Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f5f6fa;
font-family:system-ui;
}

.card{
border-radius:12px;
}

#explainPanel{
width:100%;
border-radius:8px;
border:1px solid #ddd;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="card shadow">

<div class="card-body">

<h3 class="mb-3">
Respiratory Illness Detection using AI
</h3>

<p class="text-muted">
Upload a respiratory sound recording to classify the disease and visualize model explainability.
</p>

<div class="mb-3">
<input
type="file"
class="form-control"
id="audioFile"
accept="audio/*">
</div>

<button
class="btn btn-primary"
id="uploadBtn">

Upload & Predict

</button>

<div
id="loading"
class="mt-3 text-primary"
style="display:none">

Processing audio... please wait

</div>

<hr>

<div id="resultArea" style="display:none">

<h5>

Prediction :

<span
class="badge bg-success"
id="predLabel">

</span>

</h5>

<canvas
id="probChart"
height="120">

</canvas>

<h5 class="mt-4">
AI Explainability (Guided Grad-CAM)
</h5>

<img
id="explainPanel">

</div>

</div>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
